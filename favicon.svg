  <!-- Cabeçalho do calendário -->
  <rect x="12" y="20" width="40" height="13" rx="5" fill="white" opacity="0.3"/>
  <rect x="12" y="27" width="40" height="6" fill="white" opacity="0.3"/>

  <!-- Argolas -->
  <rect x="21" y="14" width="4" height="10" rx="2" fill="white" opacity="0.9"/>
  <rect x="39" y="14" width="4" height="10" rx="2" fill="white" opacity="0.9"/>

  <!-- Grelha de dias -->
  <rect x="17" y="38" width="5" height="5" rx="1.5" fill="url(#g)" opacity="0.7"/>
  <rect x="25" y="38" width="5" height="5" rx="1.5" fill="url(#g)" opacity="0.7"/>
  <rect x="33" y="38" width="5" height="5" rx="1.5" fill="url(#g)" opacity="0.7"/>
  <rect x="41" y="38" width="5" height="5" rx="1.5" fill="url(#g)" opacity="0.7"/>

  <rect x="17" y="46" width="5" height="5" rx="1.5" fill="url(#g)" opacity="0.5"/>
  <rect x="25" y="46" width="5" height="5" rx="1.5" fill="url(#g)" opacity="0.9"/>
  <rect x="33" y="46" width="5" height="5" rx="1.5" fill="url(#g)" opacity="0.5"/>
</svg>
