<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AtuAgenda — Agendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans',sans-serif;}
:root{
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;
  --success:#16a34a;--error:#dc2626;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;
  --bg:#ffffff;--bg2:#fafaf9;--bg3:#f5f5f4;
  --border:#e7e5e4;--radius:14px;--shadow:0 4px 24px rgba(0,0,0,.10);
}
body{background:var(--bg2);min-height:100vh;color:var(--text);}
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.header-logo{font-size:1.05rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px;}
.lang-btns{display:flex;gap:4px;}
.lang-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:4px 9px;font-size:0.73rem;font-weight:600;cursor:pointer;color:var(--text2);transition:.15s;}
.lang-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.container{max-width:500px;margin:0 auto;padding:20px 16px 60px;}
.card{background:var(--bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.section{padding:20px;}
.section-title{font-size:0.76rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.section-title i{color:var(--primary);}
/* Prof */
.prof-header{padding:24px 20px;text-align:center;}
.prof-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:white;margin:0 auto 12px;}
.prof-nome{font-size:1.15rem;font-weight:700;}
.prof-tipo{font-size:0.83rem;color:var(--text3);margin-top:4px;}
/* Serviços */
.servico-grid{display:flex;flex-wrap:wrap;gap:8px;}
.servico-chip{padding:8px 14px;border-radius:20px;border:2px solid var(--border);font-size:0.83rem;font-weight:600;cursor:pointer;transition:.15s;background:var(--bg);color:var(--text2);}
.servico-chip.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
/* Calendário */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-mes{font-size:0.95rem;font-weight:700;}
.cal-btn{background:none;border:1.5px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:0.85rem;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.cal-btn:hover{border-color:var(--primary);color:var(--primary);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:0.7rem;font-weight:700;color:var(--text3);padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:0.84rem;font-weight:500;cursor:default;transition:.15s;}
.cal-day.disponivel{cursor:pointer;}
.cal-day.disponivel:hover{background:var(--primary-light);color:var(--primary);}
.cal-day.selected{background:var(--primary)!important;color:white!important;font-weight:700;}
.cal-day.today{border:2px solid var(--primary);color:var(--primary);font-weight:700;}
.cal-day.disabled{color:var(--text3);opacity:.35;}
/* Slots */
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.slot-btn{padding:9px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:0.85rem;font-weight:600;cursor:pointer;text-align:center;transition:.15s;color:var(--text2);}
.slot-btn:hover{border-color:var(--primary);color:var(--primary);}
.slot-btn.selected{background:var(--primary);color:white;border-color:var(--primary);}
.no-slots{padding:16px;text-align:center;color:var(--text3);font-size:0.86rem;}
/* Form */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:0.82rem;font-weight:600;color:var(--text2);margin-bottom:6px;}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:0.9rem;color:var(--text);background:var(--bg);outline:none;transition:.15s;}
.form-input:focus{border-color:var(--primary);}
/* Resumo */
.resumo-box{background:var(--primary-light);border:1.5px solid #bfdbfe;border-radius:12px;padding:14px;margin-bottom:16px;display:flex;flex-direction:column;gap:8px;}
.resumo-row{display:flex;align-items:center;gap:10px;font-size:0.87rem;}
.resumo-row i{color:var(--primary);width:16px;flex-shrink:0;}
.resumo-val{font-weight:600;}
/* Botão */
.btn-primary{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border:none;border-radius:12px;padding:14px;font-size:0.97rem;font-weight:700;cursor:pointer;transition:.15s;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary:hover:not(:disabled){filter:brightness(1.07);}
/* Loading */
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-box{padding:40px 24px;text-align:center;}
.state-icon{font-size:2.8rem;margin-bottom:14px;}
.state-title{font-size:1.05rem;font-weight:700;margin-bottom:8px;}
.state-desc{font-size:0.86rem;color:var(--text2);line-height:1.55;}
/* Sucesso */
.success-icon{width:68px;height:68px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.9rem;color:var(--success);}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo"><i class="fas fa-calendar-check"></i> AtuAgenda</div>
  <div class="lang-btns">
    <button class="lang-btn" onclick="setLang('pt')">PT</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
  </div>
</div>

<div class="container" id="app">
  <div class="card"><div class="state-box"><div class="spinner"></div></div></div>
</div>

<script>
// ─── Traduções ────────────────────────────────────────────
const T = {

    carregando:'A carregar...',

    desativ_desc:'O agendamento online não está disponível de momento. Contacta diretamente o profissional.',

    dias:['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
  },
  en:{
    carregando:'Loading...',
    escolhe_servico:'Choose a service',
    escolhe_data:'Choose a date',
    escolhe_hora:'Choose a time',
    teus_dados:'Your details',
    nome_label:'Full name',tel_label:'Phone',nota_label:'Note (optional)',
    nome_ph:'Your name',tel_ph:'+351 000 000 000',
    btn_confirmar:'Confirm Booking',
    sem_slots:'No available slots on this day.',
    sucesso_titulo:'Booking sent! ✓',
    sucesso_desc:'Your booking is awaiting confirmation. The professional will accept or decline shortly.',
    desativ_titulo:'Booking unavailable',
    desativ_desc:'Online booking is not available at the moment. Please contact the professional directly.',
    erro_titulo:'Profile not found',
    erro_desc:'Check the link and try again.',
    campo_obrig:'Please enter your name and phone.',
    meses:['January','February','March','April','May','June','July','August','September','October','November','December'],
    dias:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
  },
  es:{
    carregando:'Cargando...',
    escolhe_servico:'Elige el servicio',
    escolhe_data:'Elige la fecha',
    escolhe_hora:'Elige la hora',
    teus_dados:'Tus datos',
    nome_label:'Nombre completo',tel_label:'Teléfono',nota_label:'Nota (opcional)',
    nome_ph:'Tu nombre',tel_ph:'+351 000 000 000',
    btn_confirmar:'Confirmar reserva',
    sem_slots:'Sin horarios disponibles.',
    sucesso_titulo:'¡Reserva enviada! ✓',
    sucesso_desc:'Tu reserva está pendiente de confirmación. El profesional la aceptará o rechazará en breve.',
    desativ_titulo:'Reserva no disponible',
    desativ_desc:'La reserva online no está disponible. Contacta directamente con el profesional.',
    erro_titulo:'Perfil no encontrado',
    erro_desc:'Verifica el enlace e inténtalo de nuevo.',
    campo_obrig:'Rellena el nombre y el teléfono.',
    meses:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
    dias:['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],
  },
  fr:{
    carregando:'Chargement...',
    escolhe_servico:'Choisissez un service',
    escolhe_data:'Choisissez une date',
    escolhe_hora:"Choisissez l'heure",
    teus_dados:'Vos coordonnées',
    nome_label:'Nom complet',tel_label:'Téléphone',nota_label:'Note (facultatif)',
    nome_ph:'Votre nom',tel_ph:'+351 000 000 000',
    btn_confirmar:'Confirmer le rendez-vous',
    sem_slots:'Aucun créneau disponible ce jour.',
    sucesso_titulo:'Rendez-vous envoyé! ✓',
    sucesso_desc:'Votre demande est en attente de confirmation. Le professionnel acceptera ou refusera bientôt.',
    desativ_titulo:'Réservation indisponible',
    desativ_desc:"La réservation en ligne n'est pas disponible. Contactez directement le professionnel.",
    erro_titulo:'Profil introuvable',
    erro_desc:'Vérifiez le lien et réessayez.',
    campo_obrig:'Veuillez saisir votre nom et téléphone.',
    meses:['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],
    dias:['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],
  }
};

// ─── Estado ───────────────────────────────────────────────
let lang = 'pt';
let uid = null;
let db = null;
let profData = null;
let agendConfig = null;
let servicosConfig = [];
let selServico = null;
let selData = null;
let calData = null;
let selSlot = null;

function tr(k){ return (T[lang]&&T[lang][k])||T.pt[k]||k; }

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  if (profData) renderApp();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init feito pelo script Firebase em baixo

async function loadPerfil(){
  try {
    const doc = await db.collection('users').doc(uid).get();
    if (!doc.exists){ showErro(); return; }
    const d = doc.data();
    agendConfig = d.agendConfig || null;
    servicosConfig = d.servicosConfig || [];
    profData = {
      nome: d.nome || d.displayName || d.email || 'Profissional',
      tipo: d.tipo || ''
    };
    if (!agendConfig || !agendConfig.ativo){ showDesativado(); return; }
    calData = new Date(); calData.setDate(1);
    renderApp();
  } catch(e){ showErro(); }
}

// ─── Render ───────────────────────────────────────────────
function renderApp(){
  if (!profData) return;
  const iniciais = profData.nome.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card">
      <div class="prof-header">
        <div class="prof-avatar">${iniciais}</div>
        <div class="prof-nome">${esc(profData.nome)}</div>
        ${profData.tipo?`<div class="prof-tipo">${esc(profData.tipo)}</div>`:''}
      </div>
    </div>

    ${servicosConfig.length>0?`
    <div class="card"><div class="section">
      <div class="section-title"><i class="fas fa-cut"></i>${tr('escolhe_servico')}</div>
      <div class="servico-grid">
        ${servicosConfig.map(s=>`<div class="servico-chip${selServico===s.nome?' selected':''}" onclick="escolherServico('${esc(s.nome)}')">${esc(s.nome)}</div>`).join('')}
      </div>
    </div></div>`:''}

    <div class="card"><div class="section">
      <div class="section-title"><i class="fas fa-calendar"></i>${tr('escolhe_data')}</div>
      ${renderCal()}
    </div></div>

    <div class="card" id="slots-card" style="${selData?'':'display:none'}">
      <div class="section">
        <div class="section-title"><i class="fas fa-clock"></i>${tr('escolhe_hora')}</div>
        <div id="slots-wrap">${selData?renderSlots():''}</div>
      </div>
    </div>

    <div class="card" id="form-card" style="${selSlot?'':'display:none'}">
      <div class="section">
        <div class="section-title"><i class="fas fa-user"></i>${tr('teus_dados')}</div>
        ${selSlot?`
        <div class="resumo-box">
          ${selServico?`<div class="resumo-row"><i class="fas fa-cut"></i><span class="resumo-val">${esc(selServico)}</span></div>`:''}
          <div class="resumo-row"><i class="fas fa-calendar"></i><span class="resumo-val">${fmtData(selData)}</span></div>
          <div class="resumo-row"><i class="fas fa-clock"></i><span class="resumo-val">${selSlot}</span></div>
        </div>`:''}
        <div class="form-group">
          <label class="form-label">${tr('nome_label')} *</label>
          <input class="form-input" id="f-nome" type="text" placeholder="${tr('nome_ph')}">
        </div>
        <div class="form-group">
          <label class="form-label">${tr('tel_label')} *</label>
          <input class="form-input" id="f-tel" type="tel" placeholder="${tr('tel_ph')}">
        </div>
        <div class="form-group">
          <label class="form-label">${tr('nota_label')}</label>
          <input class="form-input" id="f-nota" type="text" placeholder="...">
        </div>
        <div id="f-erro" style="color:var(--error);font-size:0.8rem;margin-bottom:8px;display:none;">${tr('campo_obrig')}</div>
        <button class="btn-primary" id="btn-confirmar" onclick="submeter()">${tr('btn_confirmar')}</button>
      </div>
    </div>
  `;
}

function renderCal(){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const ano = calData.getFullYear(), mes = calData.getMonth();
  const prim = new Date(ano,mes,1).getDay();
  const total = new Date(ano,mes+1,0).getDate();
  const meses = tr('meses'), dias = tr('dias');

  let h = `<div class="cal-nav">
    <button class="cal-btn" onclick="navMes(-1)"><i class="fas fa-chevron-left"></i></button>
    <span class="cal-mes">${meses[mes]} ${ano}</span>
    <button class="cal-btn" onclick="navMes(1)"><i class="fas fa-chevron-right"></i></button>
  </div><div class="cal-grid">
    ${dias.map(d=>`<div class="cal-dow">${d}</div>`).join('')}`;

  for(let i=0;i<prim;i++) h+=`<div class="cal-day"></div>`;
  for(let d=1;d<=total;d++){
    const dt=new Date(ano,mes,d); dt.setHours(0,0,0,0);
    const ds=dt.getDay();
    const eHoje=dt.getTime()===hoje.getTime();
    const passado=dt<hoje;
    const conf=agendConfig&&agendConfig.horarios&&agendConfig.horarios[ds];
    const disp=!passado&&conf&&conf.ativo;
    const sel=selData&&dt.getTime()===selData.getTime();
    const cls=['cal-day',disp?'disponivel':'disabled',sel?'selected':'',eHoje&&!sel?'today':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}"${disp?` onclick="escolherData(${ano},${mes},${d})"`:''}>${d}</div>`;
  }
  h+='</div>';
  return h;
}

function renderSlots(){
  if(!selData||!agendConfig) return `<div class="no-slots">${tr('sem_slots')}</div>`;
  const ds=selData.getDay();
  const c=agendConfig.horarios&&agendConfig.horarios[ds];
  if(!c||!c.ativo) return `<div class="no-slots">${tr('sem_slots')}</div>`;
  const slots=gerarSlots(c.inicio,c.fim,agendConfig.slotMinutos||30);
  if(!slots.length) return `<div class="no-slots">${tr('sem_slots')}</div>`;
  return `<div class="slots-grid">${slots.map(s=>`<button class="slot-btn${selSlot===s?' selected':''}" onclick="escolherSlot('${s}')">${s}</button>`).join('')}</div>`;
}

function gerarSlots(ini,fim,min){
  const sl=[];
  let [h,m]=ini.split(':').map(Number);
  const [hf,mf]=fim.split(':').map(Number);
  while(h*60+m<hf*60+mf){
    sl.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));
    m+=min; if(m>=60){h+=Math.floor(m/60);m%=60;}
  }
  return sl;
}

function fmtData(d){
  if(!d) return '';
  const dias=tr('dias'),meses=tr('meses');
  return `${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
}

// ─── Ações ────────────────────────────────────────────────
function escolherServico(nome){ selServico=nome; renderApp(); }
function navMes(dir){ calData.setMonth(calData.getMonth()+dir); renderApp(); }

function escolherData(a,m,d){
  selData=new Date(a,m,d); selSlot=null;
  renderApp();
  setTimeout(()=>{ const el=document.getElementById('slots-card'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },80);
}

function escolherSlot(s){
  selSlot=s; renderApp();
  setTimeout(()=>{ const el=document.getElementById('form-card'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },80);
}

async function submeter(){
  const nome=(document.getElementById('f-nome')||{}).value?.trim()||'';
  const tel=(document.getElementById('f-tel')||{}).value?.trim()||'';
  const nota=(document.getElementById('f-nota')||{}).value?.trim()||'';
  const erroEl=document.getElementById('f-erro');
  if(!nome||!tel){ if(erroEl) erroEl.style.display='block'; return; }
  if(erroEl) erroEl.style.display='none';
  const btn=document.getElementById('btn-confirmar');
  if(btn){btn.disabled=true;btn.textContent='...';}
  try{
    const ds=`${selData.getFullYear()}-${String(selData.getMonth()+1).padStart(2,'0')}-${String(selData.getDate()).padStart(2,'0')}`;
    await db.collection('users').doc(uid).collection('marcacoes').add({
      nomeCliente:nome, telefone:tel, nota,
      servico:selServico||'',
      data:ds, hora:selSlot,
      estado:'pendente', idioma:lang,
      timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
    showSucesso();
  }catch(e){
    console.error(e);
    if(btn){btn.disabled=false;btn.textContent=tr('btn_confirmar');}
  }
}

// ─── Estados ──────────────────────────────────────────────
function showDesativado(){
  document.getElementById('app').innerHTML=`<div class="card"><div class="state-box">
    <div class="state-icon">🔒</div>
    <div class="state-title">${tr('desativ_titulo')}</div>
    <div class="state-desc">${tr('desativ_desc')}</div>
  </div></div>`;
}
function showErro(){
  document.getElementById('app').innerHTML=`<div class="card"><div class="state-box">
    <div class="state-icon">⚠️</div>
    <div class="state-title">${tr('erro_titulo')}</div>
    <div class="state-desc">${tr('erro_desc')}</div>
  </div></div>`;
}
function showSucesso(){
  document.getElementById('app').innerHTML=`<div class="card"><div class="state-box">
    <div class="success-icon"><i class="fas fa-check"></i></div>
    <div class="state-title">${tr('sucesso_titulo')}</div>
    <div class="state-desc" style="margin-top:8px;">${tr('sucesso_desc')}</div>
    <div class="resumo-box" style="margin-top:20px;text-align:left;">
      ${selServico?`<div class="resumo-row"><i class="fas fa-cut"></i><span class="resumo-val">${esc(selServico)}</span></div>`:''}
      <div class="resumo-row"><i class="fas fa-calendar"></i><span class="resumo-val">${fmtData(selData)}</span></div>
      <div class="resumo-row"><i class="fas fa-clock"></i><span class="resumo-val">${selSlot}</span></div>
    </div>
  </div></div>`;
}
</script>
